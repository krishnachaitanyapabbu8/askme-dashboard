name: Process Ramco Logs

on:
  push:
    paths:
      - 'logs/*.xlsx'
      - 'logs/*.xls'
      - 'logs/*.csv'

jobs:
  process-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run log parser
        run: npm run parse-logs

      - name: Commit updated dashboard data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto: update dashboard from Ramco logs [skip ci]'
          file_pattern: 'public/AskQ_Master_Dashboard.xlsx logs/completed/'
          commit_user_name: 'AskMe Dashboard Bot'
          commit_user_email: 'dashboard-bot@noreply.com'
