name: Process Ramco Logs

on:
  push:
    paths:
      - 'logs/*.xlsx'
      - 'logs/*.xls'
      - 'logs/*.csv'
  workflow_dispatch:

jobs:
  process-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run log parser
        run: npm run parse-logs

      - name: Commit and push updated dashboard data
        run: |
          git config user.name "AskMe Dashboard Bot"
          git config user.email "dashboard-bot@noreply.com"
          git add public/AskQ_Master_Dashboard.xlsx logs/completed/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: update dashboard from Ramco logs [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
